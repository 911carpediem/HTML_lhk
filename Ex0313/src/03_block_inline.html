<!DOCTYPE html>
<html lang = "ko">

    <head>
        <!-- 블록요소(줄 바뀜), 인라인 요소(줄 안바뀜) -->
        <title>블록요소와 inline(인라인)요소</title>
    </head>

    <body> 
        안녕하세요
        <!-- 볼드체를 만드는 <b>태그 -->
        <!-- p태그나 h태그와 같이 브라우저의 너비를
         혼자서 모두 자치하는 태그를 '블록요소'라고 한다 -->
        <!-- 줄이 바뀌는 태그 : 블록요소 ex) <p>,<h1>, <hr>
             줄이 바뀌지 않는 태그 : 인라인요소 ex) <b>, <strong> -->
        <!-- <strong> 태그는 소리내서 읽을 때 더 강하게 읽어줌 (시각장애인을 위함) -->
        <p>단락을 정의하는 <b>p태그</b>는 <strong>블록</strong>요소</p>
        <p>
            <!-- <em>태그도 <strong>태그처럼 강조해서 읽어줌 -->
            <!-- <br/>태그 강제로 줄바꿈 해줌 -->
            <!-- <br> : 강제개행 태그 -->
            <!-- 원래는 <br>로 사용해도 되지만 리엑트에서는 안되서 <br/>으로 사용  -->
            <i>첫번째 줄</i> <br/>
            <em>두번째 줄</em> <br/>
            세번째 줄
        </p> 
        <!-- 수평선 태그 hr : 블록요소, 단락을 바꿀 때 사용하는 태그(수평선이 생김)-->
        <hr/>

        <p>
            <!-- target="_blank"는 새탭(새로운 창)으로 열림 -->
            <a href="01_init.html" target="_blank">링크를 연결하는 a태그</a>
            <a href="https://www.naver.com">네이버</a>
            <!-- 연결할 곳이 정해지지 않은 a태그에는 임시링크 #을 넣어둔다. -->
            <a href="#">인라인 요소인 a태그</a>
        </p>

    </body>

</html>
