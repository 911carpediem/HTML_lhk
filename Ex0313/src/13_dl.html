<!DOCTYPE html>

<html lang = "ko">

    <head>

        <title>dl(정의목록)</title>
    </head>

    <body>
        <!-- dl(description list)은 dt,dd와 함께 사용함. <dd>부분 들여쓰기 -->
         <!-- dt는 dl의 제목을 dd는 그 내용을 설명할 때 사용 -->
        <dl>
            <dt>bear</dt>
            <dd>곰</dd>
            <dd>참다, 견디다</dd>
        </dl>
    </body>
</html>
