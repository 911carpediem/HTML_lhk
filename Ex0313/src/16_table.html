<!DOCTYPE html>
<html lang="ko">

    <head></head>

    <body>
        <!-- table 구조 : 표(tr(행)과 td(열)을 가지고 있음), 기본적으로 테이블 투명함. -->
        <!-- <table> 태그는 <tr> <td>와 함께 사용함 -->
        <!-- tr = table row, td = table data -->
        <p>표 만들기(1행 1열)</p>
        <table border="1">
            <tr>
                <td style="background-color: rgb(243, 225, 124);">1행 1열</td>
            </tr>
        </table>

        <hr/>

        <p>1행 2열</p>
        <table border="1">
            <tr>
                <td>1행 1열</td>
                <td>1행 2열</td>
            </tr>
        </table>

        <hr/>

        <p>2행 1열</p>
        <table border="1">
            <tr>
                <td>1행 1열</td>
            </tr>

            <tr>
                <td>2행 1열</td>
            </tr>
        </table>

        <hr/>

        <p>2행 2열</p>
        <table border="1">
            <tr>
                <td>1행 1열</td>
                <td>1행 2열</td>
            </tr>

            <tr>
                <td>2행 1열</td>
                <td>2행 2열</td>
            </tr>
        </table>

    </body>


</html>
