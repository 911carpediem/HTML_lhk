<!DOCTYPE html>
<html lang ="ko">

    <head>
        <title>추가/삭제</title>
    </head>

    <body>
        <!-- <del>태그 : 상쇄선(가운데 줄쳐짐) -->
        <!-- <ins>태그 : 밑줄 -->
        <!-- <br/> : Enter -->
        <!-- 가운데 줄을 긋는 del과 밑줄을 긋는 ins -->
        정기세일 : <del>8.30 ~ 9.15</del><br/>
        세일기간 변경 : <ins>9.01 ~ 9.10</ins><br/>
        <!-- sub : 밑(아래) 첨자, sup : 위 첨자(ex:제곱) -->
         <!-- 아래 첨자를 만드는 sub와 제곱과 같이 표현하는 sup -->
        m<sub>2</sub>
        co<sup>2</sup>
        
    </body>

</html>
