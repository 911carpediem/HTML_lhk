<!DOCTYPE html>
<!-- 인용문 -->
<html lang="ko">

<head>
    <title>블롯콧(인용문)</title>
</head>

<boby>
    <!-- <blockquote> : 장문의 글을 작성할 때 단락 자체를 '들여쓰기' 해주는 용도로 사용
        Style 시트도 사용가능. -->
    <p>뽀로로 3기 엔딩송</p>
    <blockquote>
        개구쟁이 뽀로로 장난꾸러기 크롱 우람한 포비
        조그만 해리도 사이좋은 친구죠
        영리한 에디 우직한 로디 수줍은 루피
        발랄한 패티도 사이좋은 친구죠
        생긴건 달라도 언제나 우리는 사이좋은 친구죠
    </blockquote>
</boby>

</html>
