<!DOCTYPE html>
<html lang="ko">

<head>
    <title>리스트</title>
    <!-- ul(unrodered list) : 비순서 목록
         ol(ordered list) : 순서 목록
         ul, ol은 li와 함께 사용해야 함 -->
</head>

<body>
        <!-- ul (Unordered list) :비순서 목록(정렬x) , 기본적으로 들여쓰기가 되어있음. ul이 더 많이 쓰임, 
         ul은 기본적으로 list(순서) 관련된건 거의 다 씀. ul+li
             ol (Ordered list) : 순서 목록(정렬o), ol은 ul에 비해 많이 쓰이진 않음.
             ul, ol은 li와 함께 사용해야함 -->
        <!--<ul> : 단독사용x <li>태그와 반드시 같이사용
            li는 앞에 동그라미 기호, ol은 앞에 순서기호  -->
    <ul>
        <li>menu1</li>
        <li>menu2</li>
        <li>menu3</li>
    </ul>

    <hr />

    <ol> <!-- ol은 리스트들에 숫자를 붙혀서 나옴 -->
        <li>menu1</li>
        <li>menu2</li>
        <li>menu3</li>
    </ol>

    <hr />

        <li> <a href="07_abbr.html"> <img src="resources/image/acid2Test.jpg" alt="웃는얼굴 이미지"/> </a></li>
    </ul>
    <img src="resources/image/coffee.jpg" alt="커피" title="coffee">
</body>

</html>
