<!DOCTYPE html>

<html lang = "ko">

    <head></head>

    <body>
        <!-- <p>태그 줄 요소2개, <p>태그는 기본적으로 16픽셀을 가지고 있음. 블록요소 -->
        <p>안녕하세요</p>
        <p>반가워요</p>
        <!-- <div>태그는 바깥쪽 여백을 가지고 있지 않은 태그임. 여백없음.

        <!-- div는 margin을 안가지고 있어 서로 붙어있음 -->
        <!-- 비슷한 영역에 위치한 요소들을
             한번에 묶어서 관리하기 위한 용도의 태그 -->
        <div>
            나는 div의 내용
        </div>

        <div>
            나도 div의 내용
        </div>

    </body>
