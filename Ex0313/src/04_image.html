<!DOCTYPE html>
<html lang="ko">

<head>
    <title>이미지 태그</title>
</head>

<body>
    <!-- <img/>이미지 태그는 보통 열면서 바로 닫는 구조로 만듦. -->
    <!-- alt로 넣으면 이미지에 대한 설명을 넣을 수 있음(음성으로 읽어줌, 음성낭독기) -->
    <img src="resources/image/background.jpg" alt="이미지 설명" />
    <!-- 이미지에 마우스 올렸을 때 나오는 툴팁에 title로 설명을 적을 수 있다 -->
    <img src="resources/image/float.jpg" alt="이미지 설명" title="구름이미지" />

</body>

</html>
