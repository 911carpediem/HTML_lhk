<!DOCTYPE html>
<!-- font : 글꼴 관련된 것들 -->
<html lang="ko">

<head>
    <style>
        .a1{ font-size: 30px;} /*글자 크기*/
        .a2{ font-style: italic;} /*글자 스타일 : 기울기(italic), 기본(nomal) */
        .a3{ font-weight: bold;} /*글자 두께 : bold, nomal 둘 중 하나 선택하는게 좋음*/
        /* 처음 글꼴 형태가 적용 안될 경우, 다음 글꼴로 적용됨 
        sans-serif : 거의 모든 브라우저(웹)에서 인식하는 글꼴이라 자주 쓰임(돋움체랑 비슷)*/
        .a4{ font-family:"궁서2", dotum,"돋움", sans-serif;}
        /* samll-caps : 소문자 사이즈를 유지하면서 형태는 '대문자'로 보여줌 */
        .a5{ font-variant: small-caps;} /*소문자 크기의 대문자 */

        /*폰트관련 모든 속성을 한줄로 정의*/
        /*두께, 스타일, 스몰캡, 사이즈, 패밀리*/
        /*순서를 꼭 맞춰서 작성해야함!! 두께, 스타일, 스몰캡, 크기, 글씨체
        .a6{ font:bold normal small-caps 18px "돋움", sans-serif; }*/
        /* 필요없는 속성은 생략 가능, 단! 전체적인 순서는 맞아야함*/
        .a6{ font:bold 18px "돋움", sans-serif; }
        /*.a6{ font:bold 18px; } 이건 적용 안됌. 
        ☆bold를 적용하려면 글꼴까지 함께 정의되어 있어야 한다.
        두께 관련 된 걸 표시 하고싶을 땐 반드시 글꼴이 명시되어 있어야함!! */
        /*글자 사이즈만 바꾸고 싶으면, size : 18px로 작성해야함
        ☆사이즈만 정의하려면 font-size라고 정확히 명시되어 있어야 한다*/

    </style>
</head>

<body>
    <p class="a1">글자 크기</p>
    <p class="a2">글자 스타일</p>
    <p class="a3">글자 두께</p>
    <p class="a4">글꼴</p>
    <p class="a5">The end</p>
    <p class="a6">폰트에 적용되는 css 순서</p>
</body>


</html>
