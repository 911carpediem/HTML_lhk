<!DOCTYPE html>
<html lang="ko">

    <head>
        <style>
            /*
            div{
            margin: 15px; 
            border-top: 10px red solid; 
            border-bottom: 10px red solid;
            padding: 10px;}
            */
            /* 값을 한방에 주는 법, 0일때만 유일하게 픽셀(px)단위를 안적어도 됨 */
            div{ border-width: 10px 0;
                 border-style: solid;
                 border-color: red;
                 width: 600px;
                 padding:10px;
                 text-indent: 15px; /*첫 단락(줄) '들여쓰기'*/
                 text-align:justify;} /* 텍스트 정렬방식_justify: 정렬(기본값), 양쪽정렬
                 center안에 있는 내용이 '가운데 정렬'됨*/
        </style>
    </head>

    <body>
        <div>
            우리의 자랑 스포츠의 꽃 김은호 선수의 요즘 행보에 대해 일부의 사람들이
            불만을 토로하고 있다. 그녀의 주류광고가 문제 된 것인데 그렇다면 김은호는
            미성년자도 아닌데 왜 주류광고에 나오면 안 되고 다른 스타들은 되는...이런
            우스운 경우가 있을 수 있을까? 다른 스타들도 김은호처럼 소중한 우리의 스타고
            김은호도 다른 사람들처럼 인형이 아닌 성인의 한 사람인데 말이다.
        </div>
    </body>


</html>
