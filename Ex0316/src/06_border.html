<!DOCTYPE html>
<!-- border : 모든 '테두리'에 관한 내용 -->
<html lang="ko">

<head>
    <style>
        p{ border-width:20px;
            border-color: blue; }
        /* border-style : none; 테두리 없음 hidden; 테두리'숨김', solid; 실선(가장 많이 쓰임) */
        .box1{ border-style: none; } /*테두리 눈에 보이지 않는 속성 */
        .box2{ border-style:hidden; } /*테두리 눈에 보이지 않는 속성*/
        .box3{ border-style: dotted; } /* 점 형태로 보임 */
        .box4{ border-style: dashed; } /* 점선 테두리 */
        .box5{ border-style: solid; } /* 실선 테두리 (가장 많이 쓰임)*/
        .box6{ border-style: double; } /*이중 선 테두리*/
        /* 2개는 3D처럼 나오지만 빛이 어느 방향이냐에 따라 다르게 보임 */
        .box7{ border-style: groove; } /* 영역을 가지고 있는 테두리*/
        .box8{ border-style: ridge;} /* groove와 반대(명암을 가지고 있는 테두리) */
        .box9{ border-style: inset;} /* 두께 X, 명암 O */
        .box10{ border-style: outset; } /*inset이랑 반대 */
            /* width, style, color속성 줄여서 씀 순서는 중요하지 x*/
        .div1{ border: 10px solid blue; 
                width: 200px;
                height: 100px;}
        /* 원하는 곳(위치)에만 라인을 그리고 싶으면 한 곳을 지정하여 그릴 수 있음 */
        .div2{ border-bottom: 10px solid #f00;}
        /* 두 개를 다르게 하려면 border-width 시계방향으로 픽셀이 결정됨
        테두리 두께에 관련된 것(4군데 두께를 다르게 하고 싶으면 아래와 같이 속성적용. 시계방향) */
        /* 상우하좌등 여러방향에 각각 속성을 적용하려면
        width, style등의 속성값에 border-를 꼭 넣어줘야 한다 */
        .div3{ border-width: 10px 20px 30px 40px;
              border-style: solid;
              border-color: blue; }
    </style>
</head>

<body>
    <p class="box1">box테두리 연습</p>
    <p class="box2">box테두리 연습</p>
    <p class="box3">box테두리 연습</p>
    <p class="box4">box테두리 연습</p>
    <p class="box5">box테두리 연습</p>
    <p class="box6">box테두리 연습</p>
    <p class="box7">box테두리 연습</p>
    <p class="box8">box테두리 연습</p>
    <p class="box9">box테두리 연습</p>
    <p class="box10">box테두리 연습</p>

    <div class="div1">
        div의 테두리1
    </div>

    <div class="div2">
        div의 테두리2
    </div>

    <div class="div3">
        div의 테두리3
    </div>
</body>


</html>
