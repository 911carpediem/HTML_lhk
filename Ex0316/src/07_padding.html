<!DOCTYPE html>
<html lang="ko">

<head>
    <title>padding(안쪽여백)</title>

    <style>
        /* padding : 태그안에서 텍스트 사이의 거리를 말함 */
        /* 상우좌하가 전부 적용 다르게 하려면 각각 적어주면됨 */
        p{ border:5px solid red;
            background: yellow; }
        /* 패딩 태그 하나만 넣었더니, '상하좌우'속성 모두 다 적용됨.
        padding 안쪽여백 지정 */
        .box1{ padding:20px; }
        /* 패딩 2개 적용 시, 앞은'상하' 뒤는'좌우'를 담당 
        상하, 좌우*/
        .box2{ padding:20px 50px;}
        /* 패딩 3개 적용 시, 앞은'상' 가운데'좌우' 뒤'하'를 담당 
        상, 좌우, 하*/
        .box3{ padding:10px 50px 30px;}
        /* 상 우 하 좌 (시계방향)*/
        .box4{ padding: 20px 30px 50px 70px; } 
    </style>
</head>

<body>
    <p class="box1">padding(안쪽여백) 연습</p>
    <p class="box2">padding(안쪽여백) 연습</p>
    <p class="box3">padding(안쪽여백) 연습</p>
    <p class="box4">padding(안쪽여백) 연습</p>
</body>


</html>
