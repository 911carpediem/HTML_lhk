<!DOCTYPE html>
<html lang ="ko">

<head>
    <style>
        /* '*{}'은 body안의 모든 요소를 말함 
        공식처럼 무조건 들어감!!*/
        *{ margin : 0;
           padding: 0;}

        dl{ width: 650px;
            border: 5px double gray; /*double 이중 실선 */
            /* 좌우 margin을 auto로 주면 자동으로'중앙정렬' 해줌. 
            마진은 너비를 꼭 지정해둬야 사용 가능함.  */
            margin:0 auto;}

        dt{ padding: 15px 0;
            text-align: center;
            background-color: #aaf; /*위,아래 15px, 양옆은0px */
            border-bottom:10px solid blue; 
            letter-spacing: 10px;} /* latter-spacing : 자간(글자 간격) */

        dd{ padding:10px 0;
            background : yellow; 
            text-indent: 15px;} 
        
        .line{ border-bottom: 5px dotted black;} 

    </style>
    
</head>

<boby>
        <dl>
            <dt>dl 디자인 연습</dt>
            <dd class="line">
                스타일 시트를 연습하자
            </dd>

            <dd>
                영차 영차
            </dd>
        </dl>
</boby>

</html>
