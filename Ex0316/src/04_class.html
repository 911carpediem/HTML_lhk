<!DOCTYPE html>
<html lang = "ko">

<head>
    <style>
        /* 텍스트 공백: 내부로 들어가는 키워드(안으로 들어와!)
        .(마침표) : 공백x, ".은'이름표의 정체'*'", 즉 클래스 접근
        공백 : 공백은 "위치(이동)"을 나타냄
        span : 일부분 지정태그(해당 부분만 속성 변경) */
        /* h2{ color:#f00; } */
        /* .box(공백) box라는 태그 내부로 들어어와서 거기 있는 h2에게만 접근하세요(속성을 줌) 
        클래스 이름 + 공백 + 태그 이름은 태그 안으로 들어와 그 안에 있는 태그에만 속성 줌
        ex:  h2 span.span_green{ color: green;}*/
        body div.box h2{ color:#f00; }
        span{ color:blue; }
        /* 좀 더 깊숙히 자세히 접근 가능 */
        h2 span.span_green{ color: green;}
    </style>
</head>

<boby>
    <div class="box">
        <!-- span : 일부 영역만 스타일을 줌 (인라인 요소) -->
        <h2><span>클래스</span> 연습</h2>

        <div class="box">
            <h2><span>클래스</span> 연습2</h2>
        </div>
    </div>

    <h2><span class="span_green">클래스</span> 연습3</h2>

</boby>

</html>
