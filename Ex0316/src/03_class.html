<!DOCTYPE html>
<html lang = "ko">

<head>
    <style>
        /* 태그에 클래스에 접근할 때는'.'+클래스 이름으로 접근함 */
        /* RGB값은 숫자가 같으면 줄여서 쓸 수 있음 => #ff0000 ▶ #f00 */
        /* p{ color : #f00; } */
            .txt1{ color : blue; }
            /* 특정 태그의 클래스만 접근할 수 있다 */
            h2.txt2{ color : red; }
            p.txt2{ color : green; }
    </style>
</head>

<body>
    <h2 class="txt2">클래스 연습하기</h2>
    <!-- 클래스 : 태그에 이름을 붙임, 공통적으로 같은 속성을 가진 클래스는 이름을 같게 해서 관리 가능함. 
     같은 이름으로 여러개 정의해도 상관없음.(디자인 목적으로 만들어진 개념이라서)-->
    <p class = "txt1">
        클래스 연습01
    </p>

    <p class = "txt2">
        클래스 연습02
    </p>

</body>

</html>
