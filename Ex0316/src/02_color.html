<!DOCTYPE html>
<html lnag="ko">
<!-- style시트(=CSS) 같은 걸 넣으려면 head쪽으로 와야함. 
 스타일은 바디의 태그에 적용됨-->

<head>
    <!-- #00(Red관련)00(Green관련)00(Blue관련) 16진수, RGB값(색상)-->
    <style>
        h1 {
            color: red;
        }

        h2 {
            color: blue
        }

        h3 {
            color: green
        }

        /* #000000 기본 RGB 검정색임,#ffffff 하얀색. 색상표(네이버 검색) */
        p {
            color: #FFB2D9
        }
    </style>
</head>

<body>
    <h1>스타일시트 연습01</h1>
    <h1>스타일시트 연습02</h1>
    <h2>스타일시트 연습03</h2>
    <h3>스타일시트 연습04</h3>
    <p>글자색상 관련 스타일시트의 속성</p>
</body>

</html>
