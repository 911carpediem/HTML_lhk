<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="stylesheet" href="css/reset.css" />

    <style>
        body {
            margin: 10px;
        }

        #header {
            width: 200px;
            /* fixed도 좌표를 지정해줄 수 있음
            스크롤이 내려가도 fixed로 고정해 둔 것은 계속 제자리에 있음 
            position에 같이 포함되어 있음*/
            border: 1px solid black;
            position: fixed;
            left: 50px;
            top: 30px;
        }

        #container{
            width: 300px;
            height: 1500px;
            background: #999;
            color: #fff;
            margin-left: 250px;
        }
        
    </style>
</head>

<body>
    <div id="header">
        <p><img src="resources/image/background.jpg" /></p>
        여기가 좌측에 메뉴가 들어갈 자리
    </div>

    <div id="container">
        <p>주 컨텐츠</p>
    </div>

    <div id="footer">
        <p>Copyright Allright Reserved</p>
    </div>

</body>

</html>
