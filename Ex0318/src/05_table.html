<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="stylesheet" href="css/reset.css" />

    <style>
        table {
            border: 1px solid gray;
            width: 900px;
            background: #ffc;
            margin: 0 auto;
        }

        caption {
            font-weight: bold;
            font-size: 30px;
            margin-bottom: 10px;
        }

        thead th {
            background-color: #36f;
            color: #fff;
            padding: 5px 0;
            border-bottom: 5px solid black;
        }

        .aa {
            padding: 30px 0;
            text-align: center;
        }

        /* 따로 클래스를 주지 않았기 때문에 tbody의 2번째 tr:nth-child에 있는 td들만 활용 */
        tbody tr:nth-child(2) td,
        tbody tr:nth-child(3) td {
            padding: 5px 5px 50px 5px;
        }
    </style>
</head>

<body>
    <!-- 4행 5열 -->
    <table border="1">
        <caption>업종별 모범거래기준 주요 내용 비교</caption>

        <colgroup>
            <col width="20%" />
            <col width="20%" />
            <col width="20%" />
            <col width="20%" />
            <col width="20%" />
        </colgroup>

        <thead>
            <tr>
                <th>구분</th>
                <th>제빵(4월)</th>
                <th>피자(7월)</th>
                <th>치킨(7월)</th>
                <th>커피(11월)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th>영업지역</th>
                <td class="aa">500m</td>
                <td class="aa">1,500m</td>
                <td class="aa">800m</td>
                <td class="aa">500m</td>
            </tr>

            <tr>
                <th>광고</th>
                <td>관련내용 없음<br />(분쟁없음)</td>
                <td>총 광고비 사전동의<br />광고내역 송부 등</td>
                <td>총 광고비 사전동의<br /> 광고내역 송부 등</td>
                <td>관련내용 없음<br />(분쟁없음)</td>
            </tr>

            <tr>
                <th>대금지급</th>
                <td>관련내용 없음<br />(분쟁없음)</td>
                <td>관련내용 없음<br />(분쟁없음)</td>
                <td>관련내용 없음</td>
                <td>월 1~2회 정산<br />정산기한 최소 7일 보장</td>
            </tr>
        </tbody>

    </table>
</body>

</html>
