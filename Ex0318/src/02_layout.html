<!DOCTYPE html>
<html lang="ko">

<head>

    <link rel="stylesheet" href="css/02_layout.css" />

<body>
    <!-- layout(커다랗게 묶어놓는 큰 덩어리는 id를 줌), class(작은 덩어리, 세부적으로 div들이 배치될 경우) 
     큰 덩어리는 id, 그 안에 작은 요소는 class-->
    <div id="layout">
        <div id="main">

            </div>

            <div id="a2">
                <ul>
                    <li><a href="#">HTML5</a></li>
                    <li><a href="#">CSS3</a></li>
                    <li><a href="#">JavaScript</a></li>
                    <li><a href="#">React</a></li>
                    <li><a href="#">DB</a></li>
                </ul>

            </div>
        <!-- main tag -->
        </div> 

        <div id="content">

</body>

</html>
