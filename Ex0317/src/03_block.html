<!DOCTYPE html>
<html lang="ko">

<head>
    <title>인라인 요소 -> 블록요소</title>

    <style>
        li{ list-style: none; }
        /* 'inline -> block요소'로 바꿔줌 */
        span{ display:block; }
    </style>
</head>

<body>
    <ul>
        <li>
            <!-- alt : 이미지에 대한 설명(음성낭독기가 읽어줌) -->
            <img src= "resources/image/acid2Test.jpg" alt="웃는 얼굴"/>
            <span>이미지1</span>
            <span>내용1</span>
        </li>

        <li>
            <img src= "resources/image/acid2Test.jpg" alt="웃는 얼굴"/>
            <span>이미지2</span>
            <span>내용2</span>
        </li>
    </ul>
</body>


 </html>
