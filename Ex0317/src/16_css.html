<!DOCTYPE html>
<html lang="ko">

	<head>

        <!-- 외부 스타일시트 참조(css파일 참조) -->
         <!-- rel로 어떤 타입을 참조하는지 알려주고 href로 주소를 전달해줌  -->
        <link rel="stylesheet"
              href="css/reset.css"/>

        <style>
            /* 현재페이지에서 개별적으로 넣고싶은건 style시트에서 작성해도 됨 */
            li{color:red;}
        </style>
	</head>

	<body>
        <ul>
            <li>메뉴1</li>
            <li>메뉴2</li>
        </ul>

        <a href="#">링크태그</a>

        <table border="1">
            <tr>
                <td>1행 1열</td>
                <td>1행 2열</td>
            </tr>
        </table>

	</body>

</html>
