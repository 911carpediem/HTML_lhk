<!DOCTYPE html>

<html lang="ko">

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .Menu-box {
            width: 130px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            margin: 10px auto;
        }

        a { display: block;
            text-decoration: none;
            color:#333;
            padding: 5px; }
    
        a:hover{ background: #333;
                 color:#fff; }
    </style>
</head>

<body>
    <div class="Menu-box">
        <div class="item"><a href="#">COMPANY</a></div>
        <div class="item"><a href="#">PRODUCT</a></div>
        <div class="item"><a href="#">SERVICE</a></div>
        <div class="item"><a href="#">COMMUNITY</a></div>
    </div>
</body>

</html>
