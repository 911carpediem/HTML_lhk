<!DOCTYPE html>
<!-- 자식 선택자 -->
 <html lang="ko">

<head>
    <title>자식선택자</title>
    
    <style>
        /* >를 넣으면 직계자식만 고름
        자손을 포함하지 않은 직계 자식에게만 접근( > ) 이게 자식선택자 */
        #header > h1{color: red;}
    </style>
</head>

<body>
    <!-- header안에서 h1 자식, nav안의 h1 자손 -->
    <div id="header">
        <h1>자식 선택자</h1> /*자식*/

        <div id="nav">
            <h1>자식 선택자</h1> /*자손*/
        </div>
    </div>
</body>

 </html>
