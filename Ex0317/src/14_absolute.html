<!DOCTYPE html>
<!--absolute: 원래 있던 자리에서 '원하는 포지션'으로 아예 옮기는 형태(원하는 포지션으로 옮김) -->
<html lang="ko">

<head>
    <style>
        *{margin:0; padding:0;}

        .box{ width:250px;
              border:1px solid red;
              margin:70px; 
              position: relative;}
        
        p{ width: 130px;
            height: 80px;
            padding:10px;
            color:#fff; }

        .red{ background: red; }
        /*position: absolute를 사용하면 box로 부터 독립해 body 소속이 됨  
          position: relative로 부모 box를 다시 찾아줄 수 있음, 그 친구도 여전히 내 자식이다(postion : absolute랑 짝꿍임)*/
        /* ★.blue에 left, top속성을 추가하니
            .box를 부모로 인지하지 못하고 영역 밖으로 벗어나게 됐다 
            .blue의 부모인 .box가 position:relative; 속성을 통해
            여전히 .blue의 부모임을 명시할 수 있다.*/
          .blue{ background: blue; 
               position: absolute; /* blue가 원래 있던 자리에서 공중으로 올라와서 밑에 있던 green이 올라온 형태 */
               /* 가장 왼쪽 위부터 0px임 
               왼쪽으로 50, 위로부터30으로 옮긴형태*/
               left:50px;
               top:30px; }

        .green{ background: green; }
    </style>

</head>

<body>
    <div class="box">
        <p class="red">position 1</p>
        <p class="blue">position 2</p>
        <p class="green">position 3</p>
    </div>
</body>


</html>
