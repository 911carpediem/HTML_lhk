<!DOCTYPE html>
<!-- block => inline요소로 바꾸는 법 (생각보다 많이 안쓰임)-->
<html lang="ko">

<head>
    <title>block -> inline요소로 바꾸는 CSS</title>

    <style>
        li{list-style: none;/*점 제거*/
            display: inline;}/*가로 정렬*/
    </style>

</head>

<body>
    <ul>
        <li><img src="resources/image/ub_menu_navi_01.jpg"/</li>
        <li><img src="resources/image/ub_menu_navi_02.jpg"/</li>
        <li><img src="resources/image/ub_menu_navi_03.jpg"/</li>
        <li><img src="resources/image/ub_menu_navi_04.jpg"/</li>
        <li><img src="resources/image/ub_menu_navi_05.jpg"/</li>
    </ul>
</body>

</html>
