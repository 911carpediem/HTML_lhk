<!DOCTYPE html>
<html lang="ko">

<head>
    <script>
        //2~9단까지 테이블로 그리기
   
        document.write("<table border ='1'>");
        
        document.write('<tr>') // 맨 윗줄 2~9단
        for ( let i = 2; i <= 9; i++ ) {
            document.write( '<th>' + i + '단</th>')
        }
        document.write('</tr>')

        for( let i = 1; i <= 9; i++ ){
            document.write('<tr>'); //행(가로) 9줄
            for( let j = 2; j <= 9; j++ ){
                document.write('<td>' + j + ' * ' + i + ' = ' + (i * j)+ '</td>')
            }
            document.write('</tr>');
        }
        
        document.write("</tabel>");

    </script>

</head>

</body>

</html>
