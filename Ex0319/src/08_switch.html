<!DOCTYPE html>

<html lang="ko">

<head>
    <script>
        /*prompt로 1 ~ 12사이의 값을 받는다
        입력받은 값에 해당하는 월이 몇일까지 있는지 출력
        --------------------------------------------
        입력 : 5
        5월은 31일까지 있습니다
        */

        let month = Number(prompt("1 ~ 12월 사이의 월을 입력하세요 : "));

        switch (month) {
            case 1: case 3: case 5: case 7: case 8: case 10: case 12:
                document.write(month + '월은 31일 까지 있습니다')
                break;

            case 4: case 6: case 9: case 11:
                document.write(month + '월은 30일까지 있습니다')
                break;

            case 2:
                document.write('2월은 28일까지 있습니다')
                break;

            default:
                document.write( month + "월은 없습니다")
                break;
        }//switch

    </script>
</head>

<body>

</body>

</html>
