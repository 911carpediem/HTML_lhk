<!DOCTYPE html>
<html lang="ko">

<head>
    <script>
        /*
        프롬프트에서 받은
        아래와 같은 결과를 도출해보도록 하자.

        점수 : 50
        성적 : F

        90이상 A
        80이상 B
        70이상 C
        60이상 D
        59이하 F
        */

        let score = Number(prompt("점수"));
        let grade = 0;

        if(score >= 90){
            grade = 'A';
        }else if(score >= 80){
            grade = 'B';
        }else if(score >= 70){
            grade = 'C';
        }else if(score >= 60){
            grade = 'D';
        }else{
            grade = 'F';
        }
        document.write("점수 : ", score, '<br/>');
        document.write("성적 : " + grade);


    </script>
</head>

<body>

</body>

</html>
