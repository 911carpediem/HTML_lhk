<!DOCTYPE html>
<html lang="ko">

<head>
	<script>
        //구구단 출력
        let num = Number(prompt("출력할 단"))
  
        for( let i = 1; i <= 9; i++ ){
            document.write(num, ' * ', i, " = ", (num * i) + '<br/>');
        }

        document.write('<hr/>');

        document.write('<ul>');
        for( let i = 1; i <=num; i++ ){
            document.write( '<li>메뉴' + i + '</li>');
        }

        document.write('</ul>');
      
	</script>    
</head>

<body>

</body>

</html>
