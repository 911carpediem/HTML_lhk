<!DOCTYPE html>
<html lang = "ko">
<!-- script 태그는 무조건 head 안에만 써야하는건 아님! -->
<head>
    <script>
        let a = 10; //값 담고
        let b = 3;
        let result = a + b;
        document.write( result + "<br/>" ); //출력

        result = a / b;
        // 자바스크립트에서는 소숫점 자리 끊어줄 때 .toFixed라는 걸 써서(자릿수) 입력하면 됨.
        document.write( result.toFixed(2) + "<br/>" );

        // 자바스크립트는 맨 뒤에 세미콜론(;) 안써도 좋음! but 넣는 습관들이는게 좋음.
        let num1 = 10; //숫자10
        let num2 = "10"; //문자열 10
        result = num1 == num2; //num1이랑 num2의 값이 같니?
        // 자료형과 상관없이 '=='은 값만 비교한다.
        // '==='은 값과 자료형을 모두 비교한다.
        //★ == : 타입 구별없이 값이 같다고 파단되면 참
        //★ === : 타입까지 구별해서 값이 같아야 참
        document.write( result, '<br/>')
        
    </script>
</head>

<body>

</body>


</html>
