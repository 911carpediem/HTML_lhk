<!DOCTYPE html>
<html lang="ko">

<head>
	<script>
		document.write("자바스크립트 시작");

		document.write("<br/>");

		// 자바스크립트의 자료형
		/* var : 중복된 변수명을 허용(잘 안씀 : why? 변수이름 똑같이 할 때 오류가 나야하는데, 오류를 못잡아서 탈락!! )
		 var num = 10;
		 var num2 = "안녕";
		 */
		// let : 중복된 변수가 있을 경우 오류로 표시 (제일 많이 쓰는 자료형)
		/* 기본적으로 중복되는 변수형을 쓸 수 없기 때문에 오류 발생.
		let str = "문자열";
		let str = 10;
		*/
		// const : 자바의 상수 개념으로 한번 넣은 값에 대한 변경이 불가
		
		let str = '문자열';
		str = '변경';
		
		document.write(str + '<br/>') ;

		// 자바의 상수 final 대신 const 씀
		const number = 100;
		//number = 150;

		let value = 100;
		value = true;

		let value2 = 3.14;
		// 공백을 여러개 강제로 줄 경우 &nbsp;씀 (HTML은 기본적으로 공백 1개만 줄 수 있음)
		// document.write( value +"&nbsp;&nbsp;"+ value2 ); 자바스크립트에서는 ,(콤마) +(플러스) 둘 다 쓸 수 있음.
		// + 대신 ,로 변수를 이어붙일 수 있다. (혼합사용 가능)
		document.write( value ,"&nbsp;&nbsp;", value2 );

		 
		   
	</script>
</head>

<body>

</body>

</html>
