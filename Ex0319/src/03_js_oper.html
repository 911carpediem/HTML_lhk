<!DOCTYPE html>
<html lang ="ko">

<head>
    <script>
        /*
        과수원이 있다.
        과수원에서 24시간동안 생산되는 과일의 갯수는
        사과 5개, 오렌지 10개, 배 3개이다.
        과수원에서 하루에 생산되는 과일의 총 갯수를 출력하고
        1시간에 몇개의 과일이 생산되는지 출력하시오.
        */
       let apple = 5;
       let orange = 10;
       let pear = 3;
       let total = apple+orange+pear;
       let avg = total / 24;

       document.write("하루생산량 : ", total + "개<br/>");
       document.write('시간당 평균 : ' + avg + "개");

    </script>
</head>

</body>

</html>
