<!DOCTYPE html>
<html lang="ko">

<head>
    <script>
        //int[] arr = new int[3]  ← java에서 쓰는 배열방식
        //arr[0] = 10;
        //arr[1] = 20;

        // int[] arr = {1, 2, 3, 4}; ← java에서 쓰는 방식
        // JS에서는 꼭 '[]'를 넣어야함
        let arr2 = [1, 2, 3, '홍길동', true];
        // 자바스크립트 배열은 아래와 같이 생성
        let arr = new Array(4); //4개정도 메모리를 할당할 수 있는 배열을 받을거야.
        // 자바와의 차이점 : 자바스크립트에서는 존재하지 않는 값을 넣어도 그냥 담음.(존재하지 않는 index라는게 없음.)
        // 내가 값을 넣으면 그게 곧 값임.
        // 값을 아무 타입이나 넣어도 상관없음(자료형이 1개이기 때문에)
        arr[0] = 10;
        arr[1] = "홍길동"; //배열의 타입 상관없이 모든 자료형 가능
        arr[2] = true;
        arr[3] = 3.14;
        arr[4] = 50; //JS는 존재하지 않는 인덱스 값 넣어도 출력 가능
        arr[7] = 100;// arr[5], arr[6]값 생략하고 arr[7]값 넣게 되면 출력은 되지만 알 수 없는 데이터라고 뜸

        for( let i = 0; i < arr.length; i++ ){
            // JS에서는 인덱스 역할만 함. undefined 내고 값 출력
            document.write( arr[i], '</br>' )
        }

    </script>
</head>
