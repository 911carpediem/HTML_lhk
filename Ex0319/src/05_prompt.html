<!DOCTYPE html>

<html lang="ko">

<head>
    <script>
        /*
        프롬프트를 통해서 국어, 영어, 수학점수를 받는다
        세과목의 총점과 평균을(소수점 2자리까지) 출력
        */

        let kor = Number(prompt("국어"));
        let eng = Number(prompt("영어"));
        let math = Number(prompt("수학"));
      
        /* 위에 변수에 Number 값을 주지 않았을 경우
        let total = Number(kor) + Number(eng) + Number(math);
        */
        let total = kor + eng + math;
        let avg = total / 3;
        
        document.write("총점 : " , total + "<br/>");
        document.write("평균 : ", avg.toFixed(2));
    </script>
</head>

<body>

</body>

</html>
